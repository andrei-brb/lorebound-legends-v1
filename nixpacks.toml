#[nixpacks]
# Railway sometimes auto-detects Bun; this repo is npm-based (package-lock.json).

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["DATABASE_URL=\"postgresql://postgres:postgres@localhost:5432/postgres?schema=public\" npx prisma generate"]

[start]
cmd = "npx prisma migrate deploy && npm start"

